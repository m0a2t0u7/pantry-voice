// ── Firebase グローバル参照 ───────────────────────────────────────────────
const db        = window._db;
const FAMILY_ID = window._FAMILY_ID;

// ── データ保存：Firebase設定済み→Firebase、未設定→localStorage ────────
const LS_KEY = (key) => `pantry_${FAMILY_ID}_${key}`;

const fbGet = async (key) => {
  if(db){
    try {
      const snap = await db.ref(`families/${FAMILY_ID}/${key}`).get();
      return snap.exists() ? snap.val() : null;
    } catch(e) { return null; }
  } else {
    // localStorage フォールバック
    try {
      const v = localStorage.getItem(LS_KEY(key));
      return v ? JSON.parse(v) : null;
    } catch(e) { return null; }
  }
};

const fbSet = async (key, val) => {
  if(db){
    try { await db.ref(`families/${FAMILY_ID}/${key}`).set(val); } catch(e) { console.warn(e); }
  } else {
    try { localStorage.setItem(LS_KEY(key), JSON.stringify(val)); } catch(e) { console.warn(e); }
  }
};

const fbOn = (key, cb) => {
  if(db){
    const ref = db.ref(`families/${FAMILY_ID}/${key}`);
    ref.on('value', snap => { if(snap.exists()) cb(snap.val()); });
    return () => ref.off();
  } else {
    // localStorageはリアルタイム同期なし → 何もしない
    return () => {};
  }
};

let _n=Date.now();

const pad    =n=>String(n).padStart(2,'0');
const toDStr =d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today  =()=>toDStr(new Date());
const addD   =(base,n)=>{const d=new Date(base+'T00:00:00');d.setDate(d.getDate()+n);return toDStr(d);};
const diffD  =s=>{const t=new Date(s+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/86400000);};
const fmtD   =s=>{const dv=diffD(s),d=new Date(s+'T00:00:00');return{dv,disp:`${d.getMonth()+1}/${d.getDate()}`,expired:dv<0,isToday:dv===0,soon:dv>0&&dv<=3};};
const isVegCat=cat=>['leafy','rootveg','fruitveg','mushroom'].includes(cat);
const detectCat=name=>{for(const k of CAT_ORDER){if(k==='other')continue;if(CAT[k].kw.some(w=>name.includes(w)))return k;}return'other';};
const calcExpiry=(name,pDate)=>{const m=Object.keys(SHELF).find(k=>name.includes(k));return addD(pDate,m?SHELF[m]:5);};

const parseVoice=text=>{
  const t0=new Date();t0.setHours(0,0,0,0);
  let tgt=new Date(t0);tgt.setDate(t0.getDate()+7);
  let clean=text.replace(/\s+/g,' ').trim();let qty=1;
  const qm=clean.match(/(\d+)(個|本|枚|パック|袋|つ)/);if(qm){qty=parseInt(qm[1]);clean=clean.replace(qm[0],'');}
  const dm=clean.match(/(\d+)日後/);
  if(dm){tgt=new Date(t0);tgt.setDate(t0.getDate()+parseInt(dm[1]));clean=clean.replace(dm[0],'');}
  else if(clean.includes('明後日')){tgt=new Date(t0);tgt.setDate(t0.getDate()+2);clean=clean.replace('明後日','');}
  else if(clean.includes('明日')){tgt=new Date(t0);tgt.setDate(t0.getDate()+1);clean=clean.replace('明日','');}
  else if(clean.includes('今日')){tgt=new Date(t0);clean=clean.replace('今日','');}
  const mx=clean.match(/(\d{1,2})月(\d{1,2})日/);if(mx){tgt=new Date(t0.getFullYear(),parseInt(mx[1])-1,parseInt(mx[2]));clean=clean.replace(mx[0],'');}
  clean=clean.replace(/買った|購入|入り|の|を/g,'').trim()||'未入力';
  const cat=detectCat(clean);
  if(isVegCat(cat)){const vk=Object.keys(SHELF).find(v=>clean.includes(v));if(vk){tgt=new Date(t0);tgt.setDate(t0.getDate()+SHELF[vk]);}}
  return{name:clean,date:toDStr(tgt),category:cat,quantity:qty};
};

// ── Claude API ────────────────────────────────────────────────────────────
const callClaude=async(prompt,imageB64,mediaType)=>{
  const body={
    model:'claude-haiku-4-5-20251001',max_tokens:120,
    messages:[{role:'user',content:imageB64?[
      {type:'image',source:{type:'base64',media_type:mediaType,data:imageB64}},
      {type:'text',text:prompt}
    ]:[{type:'text',text:prompt}]}]
  };
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':CLAUDE_API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify(body)
  });
  const d=await r.json();
  return d.content?.[0]?.text?.trim()||'';
};

  const [filter,      setFilter]     = useState('all');
  const [modal,       setModal]      = useState(null);
  const [editItem,    setEditItem]   = useState(null);
  const [recentId,    setRecentId]   = useState(null);
  const [toast,       setToast]      = useState(null);
  const [listening,   setListening]  = useState(false);
  const [processing,  setProcessing] = useState(false);
  const [consumingId, setConsumingId]= useState(null);
  const [expandedId,  setExpandedId] = useState(null);
  const [nName,setNName]=useState('');
  const [nDate,setNDate]=useState('');
  const [nQty,setNQty]=useState(1);
  const [nCat,setNCat]=useState('');
  const [nMemo,setNMemo]=useState('');
  const [vegMode,setVegMode]=useState('purchase');
  const [purDate,setPurDate]=useState('');
  const [shopInput,setShopInput]=useState('');
  const recog=useRef(null);
  const saveTimer=useRef(null);
  const importRef=useRef(null);

  // ── Firebase リアルタイム同期 ────────────────────────────────────────
  useEffect(()=>{
    // 初期読み込み
    Promise.all([fbGet('items'), fbGet('shopping')]).then(([it,sh])=>{
      setItems(it ? Object.values(it) : samples());
      setShopping(sh ? Object.values(sh) : []);
      setReady(true);
    });
    // リアルタイム監視
    const unsubItems    = fbOn('items',    data=>setItems(Object.values(data)));
    const unsubShopping = fbOn('shopping', data=>setShopping(Object.values(data)));
    return()=>{ unsubItems(); unsubShopping(); };
  },[]);

  // ── Auto-save ─────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!ready)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      const obj={};items.forEach(i=>{obj[i.id]=i;});
      fbSet('items',obj);
    },600);
  },[items,ready]);

  useEffect(()=>{
    if(!ready)return;
    const obj={};shopping.forEach(s=>{obj[s.id]=s;});
    fbSet('shopping',obj);
  },[shopping,ready]);

  useEffect(()=>{if(!recentId)return;const t=setTimeout(()=>setRecentId(null),8000);return()=>clearTimeout(t);},[recentId]);

  const toast$=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2600);};

  // ── CRUD ─────────────────────────────────────────────────────────────
  const addItem=(name,date,cat,qty,memo='')=>{
    const id=uid();
    setItems(p=>[{id,name:name.trim(),expiryDate:date,category:cat||detectCat(name),quantity:qty,status:'active',memo:memo||''},...p]);
    setRecentId(id);toast$(`「${name.trim()}」を追加しました`);setModal(null);
  };
  const saveEdit=()=>{setItems(p=>p.map(i=>i.id===editItem.id?{...editItem}:i));toast$('更新しました ✓');setModal(null);setEditItem(null);};
  const patch=(id,obj)=>setItems(p=>p.map(i=>i.id===id?{...i,...obj}:i));
  const freeze=(id,st)=>{patch(id,{status:st==='frozen'?'active':'frozen'});setExpandedId(null);toast$(st==='frozen'?'冷凍を解除しました':'冷凍しました ❄️');};
  const consume=id=>{
    setConsumingId(id);setExpandedId(null);
    setTimeout(()=>{setConsumingId(null);setItems(p=>p.map(i=>i.id===id?{...i,status:'consumed'}:i));toast$('消費済みにしました ✓');},700);
  };
  const restore=id=>{patch(id,{status:'active'});setExpandedId(null);toast$('リストに戻しました');};
  const remove=id=>{setItems(p=>p.filter(i=>i.id!==id));setExpandedId(null);};
  const clearH=()=>{setItems(p=>p.filter(i=>i.status!=='consumed'));toast$('履歴を削除しました');};

  // ── レシピ生成 ────────────────────────────────────────────────────────
  // ── Shopping ──────────────────────────────────────────────────────────
  const addShop=text=>{if(!text.trim())return;setShopping(p=>[...p,{id:uid(),text:text.trim(),done:false}]);setShopInput('');};
  const toggleShop=id=>setShopping(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i));
  const removeShop=id=>setShopping(p=>p.filter(i=>i.id!==id));
  const clearDoneShop=()=>setShopping(p=>p.filter(i=>!i.done));

  // ── カテゴリ remap ────────────────────────────────────────────────────
  const remapCategory=(name,oldCat)=>{
    const d=detectCat(name);if(d!=='other')return d;
    return{veg:'leafy',meat:'pork',fish:'fish',dairy:'dairy',fruit:'fruit',other:'other'}[oldCat]||'other';
  };

  // ── JSONインポート ─────────────────────────────────────────────────────
  const handleImport=e=>{
    const file=e.target.files?.[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const raw=JSON.parse(ev.target.result);
        if(!Array.isArray(raw))throw new Error('配列ではありません');
        const converted=raw.map(item=>({id:uid(),name:item.name||'不明',expiryDate:item.expiryDate||today(),category:remapCategory(item.name||'',item.category||'other'),quantity:item.quantity||1,status:item.status||'active',memo:''}));
        setItems(prev=>{
          const existingKeys=new Set(prev.map(i=>`${i.name}__${i.expiryDate}`));
          const newItems=converted.filter(i=>!existingKeys.has(`${i.name}__${i.expiryDate}`));
          toast$(`${newItems.length}品をインポートしました（重複${converted.length-newItems.length}件スキップ）`);
          return[...prev,...newItems];
        });
        setModal(null);
      }catch(err){toast$(`インポートエラー: ${err.message}`,'err');}
    };
    reader.readAsText(file);
  };

  // ── 音声入力（Claude AIで高精度解析）──────────────────────────────────
  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){toast$('このブラウザは音声非対応です','err');return;}
    const r=new SR();r.lang='ja-JP';
    r.onresult=async e=>{
      setListening(false);setProcessing(true);
      const transcript=e.results[0][0].transcript;
      try{
        if(CLAUDE_API_KEY&&CLAUDE_API_KEY!=='YOUR_CLAUDE_API_KEY'){
          const t0=new Date();t0.setHours(0,0,0,0);
          const todayStr=toDStr(t0);
          const result=await callClaude(
            `日本語の音声入力から食材情報を抽出してください。今日の日付は${todayStr}です。\n\n音声テキスト：「${transcript}」\n\n以下のJSON形式のみで返してください（説明文不要）：\n{"name":"食材名（ブランド名や産地があれば含む）","expiry":"消費期限YYYY-MM-DD形式（明日=明日の日付、今日=今日の日付、○日後=計算した日付、○月○日=その日付、不明なら購入日から7日後の${addD(todayStr,7)}）","category":"leafy/rootveg/fruitveg/mushroom/pork/beef/chicken/process/fish/seafood/egg/dairy/soy/citrus/fruit/condiment/grain/drink/frozen/other のどれか","quantity":個数(数値)}\n\n例1：「豚バラ明日2パック」→{"name":"豚バラ","expiry":"${addD(todayStr,1)}","category":"pork","quantity":2}`
          );
          const parsed=JSON.parse(result.replace(/```json|```/g,'').trim());
          if(parsed.name){addItem(parsed.name,parsed.expiry||addD(todayStr,7),parsed.category||undefined,parsed.quantity||1);}
          else{const d=parseVoice(transcript);addItem(d.name,d.date,d.category,d.quantity);}
        }else{const d=parseVoice(transcript);addItem(d.name,d.date,d.category,d.quantity);}
      }catch{const d=parseVoice(transcript);addItem(d.name,d.date,d.category,d.quantity);}
      setProcessing(false);
    };
    r.onerror=()=>{setListening(false);toast$('音声認識エラー。マイク許可を確認してください','err');};
    r.onend=()=>setListening(false);
    recog.current=r;setListening(true);r.start();
  };

  // ── Derived ──────────────────────────────────────────────────────────
  const active=items.filter(i=>i.status!=='consumed');
  const activeN=items.filter(i=>i.status==='active').length;
  const frozenN=items.filter(i=>i.status==='frozen').length;
  const expiredN=active.filter(i=>fmtD(i.expiryDate).expired).length;
  const todayN=active.filter(i=>fmtD(i.expiryDate).isToday).length;
  const soonN=active.filter(i=>fmtD(i.expiryDate).soon).length;
  const histN=items.filter(i=>i.status==='consumed').length;
  const shopDoneN=shopping.filter(s=>s.done).length;
  const sorted=[...items]
    .filter(i=>view==='history'?i.status==='consumed':i.status!=='consumed')
    .filter(i=>view==='history'||(filterFns[filter]||filterFns.all)(i))
    .sort((a,b)=>a.id===recentId?-1:b.id===recentId?1:new Date(a.expiryDate)-new Date(b.expiryDate));

  const currentAddCat=nCat||detectCat(nName);
  const showVegHelper=isVegCat(currentAddCat);
  const openAdd=()=>{setNName('');setNDate(addD(today(),7));setNQty(1);setNCat('');setNMemo('');setPurDate(today());setVegMode('purchase');setModal('add');};
  const addDisabled=!nName.trim()||(showVegHelper?(vegMode==='purchase'?!purDate:!nDate):!nDate);
  const finalDate=()=>showVegHelper&&vegMode==='purchase'?calcExpiry(nName,purDate):nDate;

  const filterPills=[
    {key:'all',    label:'すべて',   count:activeN+frozenN,c:'#475569',bg:'#f1f5f9'},
    {key:'expired',label:'期限切れ', count:expiredN,       c:'#e11d48',bg:'#ffe4e6'},
    {key:'today',  label:'今日まで', count:todayN,         c:'#c2410c',bg:'#fff7ed'},
    {key:'soon',   label:'3日以内',  count:soonN,          c:'#b45309',bg:'#fef3c7'},
    {key:'frozen', label:'冷凍中',   count:frozenN,        c:'#0369a1',bg:'#e0f2fe'},
  ];

  if(!ready)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f0fdf4',flexDirection:'column',gap:12}}>
      <SpinSvg size={36}/><div style={{fontSize:13,color:'#64748b'}}>読み込み中…</div>
    </div>
  );

  return(
    <div style={{fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif",background:'#f0fdf4',minHeight:'100vh'}}>
      <input ref={importRef} type="file" accept=".json,application/json" onChange={handleImport} style={{display:'none'}}/>

      {toast&&(<div style={{position:'fixed',top:12,left:'50%',transform:'translateX(-50%)',background:toast.type==='err'?'#f43f5e':'#1e293b',color:'#fff',padding:'9px 20px',borderRadius:999,fontSize:13,fontWeight:700,zIndex:999,whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.25)',animation:'tIn .2s ease'}}>{toast.msg}</div>)}

      {/* HEADER */}
      <header style={{background:'#fff',borderBottom:'1px solid #dcfce7',position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 6px rgba(0,0,0,.04)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px 6px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:22}}>🧊</span>
            <div style={{fontWeight:900,fontSize:15,color:'#1e293b'}}>
              {view==='history'?'消費履歴':view==='shopping'?'買い物リスト':'Pantry Voice'}
            </div>
          </div>
          <div style={{display:'flex',gap:2,alignItems:'center'}}>
            <span style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace',marginRight:4}}>#{FAMILY_ID}</span>
            <HBtn onClick={()=>setModal('settings')}><SetIco size={18}/></HBtn>
            <HBtn active={view==='history'} onClick={()=>{setView(v=>v==='history'?'list':'history');setFilter('all');}}>
              {view==='history'?<XIco size={18}/>:<HistIco size={18}/>}
            </HBtn>
          </div>
        </div>
        {view==='list'&&(
          <div style={{display:'flex',gap:5,padding:'0 10px 9px',overflowX:'auto',scrollbarWidth:'none'}}>
            {filterPills.map(p=>{
              const act=filter===p.key;
              if(p.key!=='all'&&p.count===0&&!act)return null;
              return(<button key={p.key} onClick={()=>setFilter(p.key)} style={{display:'flex',alignItems:'center',gap:4,flexShrink:0,padding:'5px 10px',borderRadius:999,border:'1.5px solid',borderColor:act?p.c:'transparent',background:act?p.bg:'#f1f5f9',color:act?p.c:'#64748b',fontSize:12,fontWeight:act?800:600,transition:'all .15s'}}>
                {p.label}
                {p.count>0&&<span style={{fontSize:10,fontWeight:800,background:act?p.c:'#cbd5e1',color:'#fff',padding:'1px 5px',borderRadius:999,lineHeight:1.4}}>{p.count}</span>}
              </button>);
            })}
          </div>
        )}
      </header>
      {/* PANTRY LIST */}
      {(view==='list'||view==='history')&&(
        <main style={{padding:'6px 8px 80px',display:'flex',flexDirection:'column',gap:4}}>
          {view==='history'&&histN>0&&(<div style={{display:'flex',justifyContent:'flex-end',padding:'2px 0 4px'}}><button onClick={clearH} style={{fontSize:11,color:'#e11d48',background:'#fff1f2',border:'1px solid #fecdd3',borderRadius:7,padding:'4px 10px',fontWeight:700,display:'flex',alignItems:'center',gap:3}}><TrashIco size={11}/> 全削除</button></div>)}
          {sorted.length===0&&(<div style={{textAlign:'center',padding:'60px 20px',color:'#94a3b8'}}><div style={{fontSize:44,marginBottom:8}}>{filter!=='all'?'✅':view==='history'?'📂':'🛒'}</div><div style={{fontSize:13}}>{filter!=='all'?'該当なし':view==='history'?'消費履歴はありません':'リストは空です'}</div>{filter!=='all'&&<button onClick={()=>setFilter('all')} style={{marginTop:10,fontSize:12,color:'#059669',background:'#dcfce7',border:'none',borderRadius:8,padding:'6px 14px',fontWeight:700}}>すべて表示</button>}</div>)}
          {sorted.map(item=>{
            const isNew=item.id===recentId,isConsuming=item.id===consumingId,isExpanded=item.id===expandedId;
            const v=vis(item,isNew),cc=CAT[item.category]??CAT.other,{disp}=fmtD(item.expiryDate),frozen=item.status==='frozen',isHistory=view==='history';
            return(
              <div key={item.id} style={{background:isConsuming?'#dcfce7':v.bg,borderRadius:10,overflow:'hidden',border:'1px solid',borderColor:isConsuming?'#86efac':(v.bar==='#e2e8f0'?'#e9f5e9':v.bar+'40'),boxShadow:isConsuming?'0 0 0 2px #86efac':'0 1px 3px rgba(0,0,0,.04)',transition:'all .18s',position:'relative'}}>
                {isConsuming&&(<div style={{position:'absolute',inset:0,background:'rgba(220,252,231,.93)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,borderRadius:10}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:30,height:30,borderRadius:'50%',background:'#16a34a',display:'flex',alignItems:'center',justifyContent:'center',animation:'scaleIn .2s cubic-bezier(.34,1.56,.64,1)'}}><CheckIco size={17}/></div><span style={{fontWeight:800,fontSize:13,color:'#15803d'}}>消費済みにしました！</span></div></div>)}
                <div onClick={()=>!isConsuming&&setExpandedId(isExpanded?null:item.id)} style={{display:'flex',alignItems:'center',cursor:'pointer',userSelect:'none'}}>
                  <div style={{width:4,background:v.bar,flexShrink:0,alignSelf:'stretch'}}/>
                  <span style={{fontSize:16,padding:'0 6px 0 7px',flexShrink:0}}>{cc.emoji}</span>
                  <div style={{flex:1,minWidth:0,padding:'8px 0'}}>
                    <div style={{fontWeight:700,fontSize:13,color:v.nc,lineHeight:1.35,overflow:isExpanded?'visible':'hidden',whiteSpace:isExpanded?'normal':'nowrap',textOverflow:isExpanded?'clip':'ellipsis'}}>
                      {item.name}
                      {item.quantity>1&&<span style={{fontSize:10,fontFamily:'monospace',fontWeight:800,color:'#64748b',background:'#e2e8f0',padding:'1px 5px',borderRadius:4,marginLeft:4}}>×{item.quantity}</span>}
                      {frozen&&<span style={{marginLeft:3,fontSize:12}}>❄️</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4,marginTop:2,flexWrap:'wrap'}}>
                      <span style={{fontSize:10,fontWeight:700,color:v.dtc,background:v.dtbg,padding:'1px 6px',borderRadius:4,lineHeight:1.4,whiteSpace:'nowrap'}}>{disp}・{v.label}</span>
                      {isExpanded&&<span style={{fontSize:10,fontWeight:600,color:cc.color,background:cc.bg,border:`1px solid ${cc.bd}`,padding:'1px 6px',borderRadius:4,lineHeight:1.4}}>{cc.label}</span>}
                    </div>
                    {item.memo&&<div style={{fontSize:10,color:'#94a3b8',marginTop:2,display:'flex',alignItems:'center',gap:3}}><NoteIco size={10}/> {item.memo}</div>}
                  </div>
                  <div style={{flexShrink:0,padding:'0 6px 0 4px'}} onClick={e=>e.stopPropagation()}>
                    {!isHistory?(<button onClick={()=>{if(!isConsuming)consume(item.id);}} disabled={isConsuming} style={{display:'flex',alignItems:'center',gap:3,padding:'6px 10px',borderRadius:8,border:'none',background:'#16a34a',color:'#fff',fontSize:12,fontWeight:800,boxShadow:'0 2px 6px rgba(22,163,74,.3)',whiteSpace:'nowrap'}}><CheckIco size={13}/> 消費</button>):(<button onClick={()=>restore(item.id)} style={{display:'flex',alignItems:'center',gap:3,padding:'5px 9px',borderRadius:7,border:'1px solid #d1fae5',background:'#f0fdf4',color:'#059669',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}><UndoIco size={12}/> 戻す</button>)}
                  </div>
                </div>
                {isExpanded&&!isHistory&&(<div style={{display:'flex',gap:6,padding:'6px 8px 8px 15px',borderTop:`1px solid ${v.bar}30`,animation:'slideDown .15s ease'}}>
                  <button onClick={e=>{e.stopPropagation();setEditItem({...item,memo:item.memo||''});setModal('edit');setExpandedId(null);}} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 11px',borderRadius:7,border:'1px solid #e2e8f0',background:'#fff',color:'#475569',fontSize:12,fontWeight:600,flex:1,justifyContent:'center'}}><EditIco size={13}/> 編集</button>
                  <button onClick={e=>{e.stopPropagation();freeze(item.id,item.status);}} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 11px',borderRadius:7,border:'1px solid',borderColor:frozen?'#7dd3fc':'#e2e8f0',background:frozen?'#e0f2fe':'#fff',color:frozen?'#0284c7':'#475569',fontSize:12,fontWeight:600,flex:1,justifyContent:'center'}}><SnowIco size={13}/> {frozen?'解凍':'冷凍'}</button>
                </div>)}
                {isExpanded&&isHistory&&(<div style={{display:'flex',gap:6,padding:'6px 8px 8px 15px',borderTop:`1px solid ${v.bar}30`,animation:'slideDown .15s ease'}}>
                  <button onClick={e=>{e.stopPropagation();remove(item.id);}} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',borderRadius:7,border:'1px solid #fecdd3',background:'#fff1f2',color:'#e11d48',fontSize:12,fontWeight:700,flex:1,justifyContent:'center'}}><TrashIco size={13}/> 完全に削除</button>
                </div>)}
              </div>
            );
          })}
        </main>
      )}

      {/* SHOPPING LIST */}
      {view==='shopping'&&(
        <main style={{padding:'8px 10px 80px',display:'flex',flexDirection:'column',gap:0}}>
          <div style={{background:'#fff',borderRadius:12,padding:'10px',marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #dcfce7'}}>
            <div style={{display:'flex',gap:6}}>
              <input value={shopInput} onChange={e=>setShopInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addShop(shopInput)} placeholder="追加する商品を入力…" style={{...iSt,flex:1,padding:'9px 12px',fontSize:14}}/>
              <button onClick={()=>addShop(shopInput)} style={{padding:'9px 14px',borderRadius:9,border:'none',background:'#16a34a',color:'#fff',fontWeight:800,fontSize:14,display:'flex',alignItems:'center',flexShrink:0}}><PlusIco size={16}/></button>
            </div>
          </div>
          {shopping.length===0?(<div style={{textAlign:'center',padding:'50px 20px',color:'#94a3b8'}}><div style={{fontSize:44,marginBottom:8}}>🛒</div><div style={{fontSize:13}}>買い物リストは空です</div></div>):(
            <>
              {shopDoneN>0&&<div style={{display:'flex',justifyContent:'flex-end',marginBottom:6}}><button onClick={clearDoneShop} style={{fontSize:11,color:'#64748b',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:7,padding:'4px 10px',fontWeight:600}}>完了済みを削除 ({shopDoneN})</button></div>}
              <div style={{background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.05)',border:'1px solid #e9f5e9'}}>
                {shopping.map((s,i)=>(
                  <div key={s.id} style={{display:'flex',alignItems:'center',padding:'11px 12px',borderBottom:i<shopping.length-1?'1px solid #f1f5f9':'none',background:s.done?'#f8fafc':'#fff'}}>
                    <button onClick={()=>toggleShop(s.id)} style={{width:24,height:24,borderRadius:6,border:'2px solid',flexShrink:0,borderColor:s.done?'#16a34a':'#d1d5db',background:s.done?'#16a34a':'#fff',display:'flex',alignItems:'center',justifyContent:'center',marginRight:10,transition:'all .15s'}}>{s.done&&<CheckIco size={13}/>}</button>
                    <span style={{flex:1,fontSize:14,fontWeight:600,color:s.done?'#94a3b8':'#1e293b',textDecoration:s.done?'line-through':'none'}}>{s.text}</span>
                    <button onClick={()=>removeShop(s.id)} style={{padding:6,background:'transparent',border:'none',color:'#cbd5e1',flexShrink:0}}><XIco size={14}/></button>
                  </div>
                ))}
              </div>
              <div style={{textAlign:'center',marginTop:10,fontSize:11,color:'#94a3b8'}}>{shopping.filter(s=>!s.done).length}品未購入 / {shopping.length}品</div>
            </>
          )}
        </main>
      )}

      {/* BOTTOM BAR */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:430,margin:'0 auto',background:'#fff',borderTop:'1px solid #dcfce7',padding:'7px 10px 14px',boxShadow:'0 -3px 14px rgba(0,0,0,.07)'}}>
        {view==='list'&&(<div style={{display:'flex',gap:6}}>
          <button onClick={openAdd} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:5,padding:'10px 0',borderRadius:9,border:'1.5px solid #e2e8f0',background:'#f8fafc',color:'#475569',fontSize:13,fontWeight:700}}><PlusIco size={15}/> 追加</button>
          <button onClick={startVoice} disabled={listening||processing} style={{flex:2,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px 0',borderRadius:9,border:'none',background:listening?'#f43f5e':processing?'#e2e8f0':'linear-gradient(135deg,#10b981,#059669)',color:processing?'#94a3b8':'#fff',fontSize:13,fontWeight:800,boxShadow:(listening||processing)?'none':'0 3px 10px rgba(16,185,129,.35)',animation:listening?'micPulse 1s ease-in-out infinite':'none',transition:'background .2s'}}>
            {listening?<><MicOff size={16}/> 聞いてます…</>:processing?<><SpinSvg size={16}/> AI解析中…</>:<><MicIco size={16}/> 音声で追加</>}
          </button>
        </div>)}
        {(view==='history'||view==='shopping')&&(<button onClick={()=>setView('list')} style={{width:'100%',padding:'10px',borderRadius:9,border:'1.5px solid #e2e8f0',background:'#f8fafc',color:'#475569',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>← 食材リストに戻る</button>)}
      </div>

      {/* ADD MODAL */}
      {modal==='add'&&(<Modal title="食材を追加" onClose={()=>setModal(null)}>
        <Fld label="商品名"><input value={nName} onChange={e=>setNName(e.target.value)} placeholder="例：国産豚バラ薄切り" style={iSt} autoFocus/></Fld>
        {showVegHelper&&(<div style={{marginTop:12,background:'#f0fdf4',borderRadius:10,padding:'10px 12px',border:'1px solid #bbf7d0'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#065f46',marginBottom:8}}>🥬 野菜の期限入力方法</div>
          <div style={{display:'flex',gap:6,marginBottom:10}}>
            {[['purchase','🛒 買った日から計算'],['expiry','📅 期限を直接入力']].map(([mode,lbl])=>(<button key={mode} onClick={()=>setVegMode(mode)} style={{flex:1,padding:'7px 6px',borderRadius:8,border:'1.5px solid',borderColor:vegMode===mode?'#059669':'#d1fae5',background:vegMode===mode?'#dcfce7':'#fff',color:vegMode===mode?'#065f46':'#6b7280',fontSize:11,fontWeight:vegMode===mode?800:600,lineHeight:1.3}}>{lbl}</button>))}
          </div>
          {vegMode==='purchase'?(<div><Fld label="買った日"><input type="date" value={purDate} onChange={e=>setPurDate(e.target.value)} style={iSt}/></Fld>{purDate&&nName&&<div style={{marginTop:7,fontSize:11,color:'#059669',fontWeight:600,background:'#dcfce7',borderRadius:6,padding:'5px 9px'}}>→ 消費期限：{(()=>{const d=calcExpiry(nName,purDate);const dd=new Date(d+'T00:00:00');return`${dd.getMonth()+1}/${dd.getDate()}（${diffD(d)}日後）`;})()}</div>}</div>):(<Fld label="消費期限"><input type="date" value={nDate} onChange={e=>setNDate(e.target.value)} style={iSt}/></Fld>)}
        </div>)}
        {!showVegHelper&&<div style={{marginTop:12}}><Fld label="消費期限"><input type="date" value={nDate} onChange={e=>setNDate(e.target.value)} style={iSt}/></Fld></div>}
        <div style={{marginTop:12}}><Fld label="個数"><QBox value={nQty} onChange={setNQty}/></Fld></div>
        <Fld label="カテゴリ（自動判別）" style={{marginTop:14}}><CatGrid value={currentAddCat} onChange={setNCat}/></Fld>
        <Fld label="一言メモ（任意）" style={{marginTop:14}}><input value={nMemo} onChange={e=>setNMemo(e.target.value)} placeholder="例：冷蔵庫の2段目" style={iSt}/></Fld>
        <button disabled={addDisabled} onClick={()=>addItem(nName,finalDate(),nCat||undefined,nQty,nMemo)} style={{...pBt,marginTop:18,opacity:addDisabled?.5:1}}>＋ 追加する</button>
      </Modal>)}

      {/* EDIT MODAL */}
      {modal==='edit'&&editItem&&(<Modal title="編集" onClose={()=>{setModal(null);setEditItem(null);}}>
        <Fld label="商品名"><input value={editItem.name} onChange={e=>setEditItem({...editItem,name:e.target.value})} style={iSt} autoFocus/></Fld>
        <div style={{display:'grid',gridTemplateColumns:'1fr 108px',gap:10,marginTop:12}}>
          <Fld label="消費期限"><input type="date" value={editItem.expiryDate} onChange={e=>setEditItem({...editItem,expiryDate:e.target.value})} style={iSt}/></Fld>
          <Fld label="個数"><QBox value={editItem.quantity} onChange={v=>setEditItem({...editItem,quantity:v})}/></Fld>
        </div>
        <Fld label="カテゴリ" style={{marginTop:14}}><CatGrid value={editItem.category} onChange={c=>setEditItem({...editItem,category:c})}/></Fld>
        <Fld label="一言メモ（任意）" style={{marginTop:14}}><input value={editItem.memo||''} onChange={e=>setEditItem({...editItem,memo:e.target.value})} placeholder="メモを入力…" style={iSt}/></Fld>
        <button onClick={saveEdit} style={{...pBt,marginTop:18}}>保存する</button>
      </Modal>)}

      {/* SETTINGS MODAL */}
      {modal==='settings'&&(<Modal title="設定・情報" onClose={()=>setModal(null)}>
        <div style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)',borderRadius:14,padding:'16px',textAlign:'center',border:'1px solid #a7f3d0',marginBottom:14}}>
          <div style={{fontSize:30,marginBottom:6}}>👨‍👩‍👧</div>
          <div style={{fontWeight:900,fontSize:15,color:'#065f46'}}>{db?'👨‍👩‍👧 家族共有モード':'📱 ローカルモード'}</div>
          <div style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:'#059669',marginTop:4,background:'#fff',borderRadius:8,padding:'4px 10px',display:'inline-block'}}>#{FAMILY_ID}</div>
          <div style={{fontSize:11,color:'#6b7280',marginTop:8,lineHeight:1.7}}>{db?<>このURLを家族に送るだけで同期。<br/>別の家族IDは URL末尾に <b>#ID名</b> で切替</>:<>Firebase未設定のためこの端末のみ保存。<br/>家族と共有するにはFirebaseを設定してください。</>}</div>
        </div>
        <div style={{background:'#f8fafc',borderRadius:12,padding:'10px 14px',display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          <IR label="現在の食材"   value={`${activeN}品`}/>
          <IR label="冷凍中"       value={`${frozenN}品`}/>
          <IR label="期限切れ"     value={`${expiredN}品`} warn={expiredN>0}/>
          <IR label="消費履歴"     value={`${histN}件`}/>
          <IR label="買い物リスト" value={`${shopping.filter(s=>!s.done).length}品未購入`}/>
        </div>
        <button onClick={()=>importRef.current.click()} style={{width:'100%',padding:11,borderRadius:10,border:'1px solid #a5b4fc',background:'#eef2ff',color:'#4338ca',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:8}}>📥 JSONファイルからインポート</button>
        <div style={{fontSize:10,color:'#94a3b8',textAlign:'center',lineHeight:1.6}}>Geminiアプリのバックアップファイルを読み込めます</div>
      </Modal>)}
    </div>
  );
}

// ── Atom components ───────────────────────────────────────────────────────
const HBtn=({onClick,active,children})=>(<button onClick={onClick} style={{padding:7,borderRadius:'50%',border:'none',background:active?'#dcfce7':'transparent',color:active?'#10b981':'#94a3b8'}}>{children}</button>);
const Modal=({title,onClose,children})=>(
  <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:14,animation:'bgIn .2s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:400,maxHeight:'90vh',overflowY:'auto',animation:'up .22s cubic-bezier(.34,1.3,.64,1)',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px 11px',borderBottom:'1px solid #f1f5f9',position:'sticky',top:0,background:'#fff',borderRadius:'20px 20px 0 0'}}>
        <h3 style={{fontWeight:900,fontSize:16,color:'#1e293b',margin:0}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#94a3b8',padding:4}}><XIco size={19}/></button>
      </div>
      <div style={{padding:16}}>{children}</div>
    </div>
  </div>
);
const Fld=({label,children,style})=>(<div style={{display:'flex',flexDirection:'column',gap:5,...style}}><label style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:.3}}>{label}</label>{children}</div>);
const QBox=({value,onChange})=>(<div style={{display:'flex',alignItems:'center',border:'1.5px solid #e2e8f0',borderRadius:10,overflow:'hidden',background:'#f8fafc',height:46}}><button type="button" onClick={()=>onChange(Math.max(1,value-1))} style={{padding:'0 10px',background:'none',border:'none',color:'#64748b',display:'flex',alignItems:'center'}}><MinusIco size={13}/></button><input type="number" value={value} onChange={e=>onChange(parseInt(e.target.value)||1)} min="1" style={{width:'100%',background:'transparent',border:'none',textAlign:'center',fontSize:16,fontWeight:800,color:'#1e293b'}}/><button type="button" onClick={()=>onChange(value+1)} style={{padding:'0 10px',background:'none',border:'none',color:'#64748b',display:'flex',alignItems:'center'}}><PlusIco size={13}/></button></div>);
const CatGrid=({value,onChange})=>{
  const[open,setOpen]=useState(null);
  return(<div style={{display:'flex',flexDirection:'column',gap:5}}>
    {CAT_GROUPS.map(group=>{
      const cats=Object.entries(CAT).filter(([,c])=>c.group===group);
      const isOpen=open===group;const selEntry=cats.find(([k])=>k===value);const hasSel=!!selEntry;
      return(<div key={group} style={{border:'1px solid #e2e8f0',borderRadius:10,overflow:'hidden'}}>
        <button onClick={()=>setOpen(isOpen?null:group)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:hasSel?'#f0fdf4':'#fafafa',border:'none',fontWeight:700,fontSize:13,color:hasSel?'#059669':'#475569'}}>
          <span>{group}</span>
          <span style={{display:'flex',alignItems:'center',gap:6}}>{hasSel&&<span style={{fontSize:12}}>{selEntry[1].emoji} {selEntry[1].label}</span>}<span style={{fontSize:10,color:'#94a3b8'}}>{isOpen?'▲':'▼'}</span></span>
        </button>
        {isOpen&&(<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,padding:'8px',background:'#fff',animation:'slideDown .12s ease'}}>
          {cats.map(([k,c])=>(<button key={k} onClick={()=>{onChange(k);setOpen(null);}} style={{padding:'7px 3px',borderRadius:8,border:'2px solid',borderColor:value===k?c.color:'#e2e8f0',background:value===k?c.bg:'#fff',fontSize:11,fontWeight:700,color:value===k?c.color:'#94a3b8',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><span style={{fontSize:16}}>{c.emoji}</span><span style={{fontSize:9,lineHeight:1.2,textAlign:'center'}}>{c.label}</span></button>))}
        </div>)}
      </div>);
    })}
  </div>);
};
const IR=({label,value,warn})=>(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0'}}><span style={{fontSize:13,color:'#64748b'}}>{label}</span><span style={{fontSize:13,fontWeight:800,color:warn?'#e11d48':'#1e293b'}}>{value}</span></div>);
const iSt={width:'100%',border:'1.5px solid #e2e8f0',borderRadius:10,padding:'11px 13px',fontSize:15,background:'#f8fafc',color:'#1e293b',fontFamily:'inherit'};
const pBt={width:'100%',background:'linear-gradient(135deg,#10b981,#059669)',color:'#fff',fontWeight:800,fontSize:15,padding:13,borderRadius:12,border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:6};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
